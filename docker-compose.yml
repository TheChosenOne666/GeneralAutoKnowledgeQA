version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xiongda-postgres
    environment:
      POSTGRES_USER: xiongda
      POSTGRES_PASSWORD: xiongda_secret
      POSTGRES_DB: xiongda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiongda"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xiongda-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Milvus 向量数据库（M2-2 真实集成，按需启用）
  # 启用：pip install pymilvus 后 `docker compose up -d milvus`，
  #       并将 ai-service/.env 中 VECTOR_STORE_TYPE=milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  milvus:
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvusdata:/var/lib/milvus

  # Elasticsearch（M5-8 复合检索）：当前改用本地 Elasticsearch 7.17
  # （D:\Elasticsearch\elasticsearch-7.17.23，含 IK 中文分词），不通过 Docker 拉取
  # （docker.elastic.co 走代理极慢，且 8.17 镜像约 1GB）。启用方式：在 ai-service 启动环境
  # 置 ELASTICSEARCH_ENABLED=true、ELASTICSEARCH_HOSTS=http://localhost:9200、
  # ELASTICSEARCH_COMPAT_7=true、ELASTICSEARCH_TEXT_ANALYZER=ik_max_word。
  # 如需 Docker 方案，取消下方注释并将 ELASTICSEARCH_COMPAT_7 设为 false（连 8.x 原生）。
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
  #   container_name: xiongda-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - ES_JAVA_OPTS=-Xms512m -Xmx512m
  #     - cluster.name=xiongda-es
  #   ports:
  #     - "9200:9200"
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #   volumes:
  #     - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  redisdata:
  etcd:
  miniodata:
  milvusdata:
