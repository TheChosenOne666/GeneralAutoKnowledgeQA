version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: xiongda-postgres
    environment:
      POSTGRES_USER: xiongda
      POSTGRES_PASSWORD: xiongda_secret
      POSTGRES_DB: xiongda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiongda"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xiongda-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # Milvus 向量数据库（M2-2 真实集成，按需启用）
  # 启用：pip install pymilvus 后 `docker compose up -d milvus`，
  #       并将 ai-service/.env 中 VECTOR_STORE_TYPE=milvus
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  milvus:
    image: milvusdb/milvus:v2.5.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvusdata:/var/lib/milvus

volumes:
  pgdata:
  redisdata:
  etcd:
  miniodata:
  milvusdata:
