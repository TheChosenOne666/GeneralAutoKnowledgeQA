server:
  port: 8080

spring:
  application:
    name: xiongda-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xiongda}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres123!@#}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id
  mapper-locations: classpath:/mapper/*.xml

# JWT
jwt:
  secret: ${JWT_SECRET:change-this-to-a-random-secret-key-at-least-32-chars}
  expiration: 86400000

# AI Service (Python)
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8001}

# 前端基础地址（用于拼接可分享的邀请链接）
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

# CORS
cors:
  origins: http://localhost:5173,http://localhost:3000

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.xiongda: DEBUG
