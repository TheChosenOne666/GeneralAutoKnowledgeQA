server:
  port: 8080

spring:
  application:
    name: xiongda-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xiongda}
    username: ${DB_USER:xiongda}
    password: ${DB_PASSWORD:xiongda_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# JWT
jwt:
  secret: ${JWT_SECRET:change-this-to-a-random-secret-key-at-least-32-chars}
  expiration: 86400000  # 24h (ms)

# AI Service (Python)
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8001}

# CORS
cors:
  origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.xiongda: DEBUG
    org.hibernate.SQL: WARN
