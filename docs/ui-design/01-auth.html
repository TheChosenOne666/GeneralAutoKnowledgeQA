<script>
/* ===== 粒子系统 ===== */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles, mouse = { x:null, y:null };
const COUNT = 90;
const COLORS = ['#10B981','#34D399','#2DD4BF','#6EE7B7'];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
function initParticles() {
  particles = [];
  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 2 + 0.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }
}
function draw() {
  ctx.clearRect(0, 0, W, H);
  // 粒子
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    // 鼠标吸引
    if (mouse.x !== null) {
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 140) { p.x += dx / dist * 0.8; p.y += dy / dist * 0.8; }
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.6;
    ctx.fill();
  }
  // 连线
  ctx.globalAlpha = 1;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 130) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = 'rgba(16,185,129,' + (0.18 * (1 - dist / 130)) + ')';
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
    // 鼠标连线
    if (mouse.x !== null) {
      const dx = particles[i].x - mouse.x, dy = particles[i].y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 180) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = 'rgba(45,212,191,' + (0.35 * (1 - dist / 180)) + ')';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize', () => { resize(); initParticles(); });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
resize(); initParticles(); draw();

/* ===== Tab 切换 ===== */
function switchTab(tab) {
  const loginTab = document.getElementById('tab-login');
  const regTab = document.getElementById('tab-register');
  const loginForm = document.getElementById('form-login');
  const regForm = document.getElementById('form-register');
  const switchText = document.getElementById('switch-text');
  if (tab === 'login') {
    loginTab.classList.add('tab-active'); loginTab.classList.remove('text-slate-400');
    regTab.classList.remove('tab-active'); regTab.classList.add('text-slate-400');
    loginForm.classList.remove('hidden'); regForm.classList.add('hidden');
    loginForm.classList.add('fade-in'); regForm.classList.remove('fade-in');
    switchText.innerHTML = '还没有账号？<a href="#" onclick="switchTab(\'register\');return false" class="text-brand-600 hover:text-brand-700 font-semibold">立即注册</a>';
  } else {
    regTab.classList.add('tab-active'); regTab.classList.remove('text-slate-400');
    loginTab.classList.remove('tab-active'); loginTab.classList.add('text-slate-400');
    regForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    regForm.classList.add('fade-in'); loginForm.classList.remove('fade-in');
    switchText.innerHTML = '已有账号？<a href="#" onclick="switchTab(\'login\');return false" class="text-brand-600 hover:text-brand-700 font-semibold">立即登录</a>';
  }
}

/* ===== 密码可见切换 ===== */
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.classList.toggle('text-brand-600');
}

/* ===== 密码强度检测 ===== */
function checkStrength(v) {
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v) || /[a-z]/.test(v)) score++;
  if (/\d/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const bars = ['s1','s2','s3','s4'];
  const colors = ['bg-red-500','bg-orange-500','bg-yellow-500','bg-emerald-500'];
  const labels = ['弱','一般','较强','强'];
  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    if (i < score) { el.className = 'strength-bar h-1 flex-1 rounded-full ' + colors[score-1]; }
    else { el.className = 'strength-bar h-1 flex-1 rounded-full bg-slate-200'; }
  });
  document.getElementById('strength-text').textContent = v ? '密码强度：' + labels[score-1] || '弱' : '密码强度：—';
}
